version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://labcal_user:labcal_pass@db:5432/labcal
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./prisma:/app/prisma

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=labcal_user
      - POSTGRES_PASSWORD=labcal_pass
      - POSTGRES_DB=labcal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labcal_user -d labcal"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
